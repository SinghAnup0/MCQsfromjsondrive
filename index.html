<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>UP GK Master Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght=400;600;700;800&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      darkMode: 'class',
    }
  </script>
  <style>
    body { font-family: 'Plus Jakarta Sans', sans-serif; transition: background-color 0.2s ease, color 0.2s ease; touch-action: pan-y; }
    .bento-card { background: white; border-radius: 24px; border: 1px solid #f1f1f1; box-shadow: 0 2px 8px rgba(0,0,0,0.02); transition: all 0.2s ease; }
    .dark .bento-card { background: #1e293b; border-color: #334155; box-shadow: 0 2px 8px rgba(0,0,0,0.2); }
    
    .option-row { display: flex; align-items: center; gap: 12px; padding: 16px; border-radius: 16px; border: 2px solid #f8f9fa; cursor: pointer; background: #f8f9fa; margin-bottom: 8px; transition: all 0.2s ease; }
    .dark .option-row { background: #334155; border-color: #475569; }
    .option-row:hover { border-color: #cbd5e1; background: #f1f5f9; }
    .dark .option-row:hover { border-color: #64748b; background: #475569; }
    
    .selected-correct { border-color: #22c55e !important; background: #f0fdf4 !important; pointer-events: none; }
    .dark .selected-correct { border-color: #22c55e !important; background: #14532d !important; }
    .selected-wrong { border-color: #ef4444 !important; background: #fef2f2 !important; pointer-events: none; }
    .dark .selected-wrong { border-color: #ef4444 !important; background: #451a03 !important; }
    
    .nav-btn { background: #1a1a1a; color: white; padding: 12px 20px; border-radius: 12px; font-weight: 700; transition: opacity 0.2s; }
    .dark .nav-btn { background: #f8fafc; color: #0f172a; }
    .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; }
    
    .shimmer { height: 24px; background: #eeeeee; border-radius: 8px; animation: pulse 1.5s infinite; }
    .dark .shimmer { background: #334155; }
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.4; } }
    
    .q-circle { display: inline-flex; align-items: center; justify-content: center; width: 28px; height: 28px; min-width: 28px; border-radius: 50%; font-size: 10px; font-weight: 800; border: 2px solid #f1f5f9; background: white; color: #64748b; cursor: pointer; transition: all 0.2s ease; user-select: none; }
    .dark .q-circle { background: #1e293b; border-color: #334155; color: #94a3b8; }
    .q-circle:hover { border-color: #cbd5e1; color: #1e293b; }
    .dark .q-circle:hover { border-color: #475569; color: #f1f5f9; }
    
    .q-circle-active { border-color: #0f172a !important; color: #0f172a !important; font-weight: 900; transform: scale(1.05); }
    .dark .q-circle-active { border-color: #f1f5f9 !important; color: #f1f5f9 !important; }
    
    .q-circle-correct { background: #dcfce7 !important; border-color: #bbf7d0 !important; color: #166534 !important; }
    .dark .q-circle-correct { background: #166534 !important; border-color: #15803d !important; color: #bbf7d0 !important; }
    .q-circle-wrong { background: #fee2e2 !important; border-color: #fecaca !important; color: #991b1b !important; }
    .dark .q-circle-wrong { background: #7f1d1d !important; border-color: #991b1b !important; color: #fecaca !important; }
    
    .no-scrollbar::-webkit-scrollbar { display: none; }
    .no-scrollbar { -ms-overflow-style: none; scroll-scrollbar-width: none; }
    
    .swipe-zone { position: relative; user-select: none; }

    .sidebar-overlay { background: rgba(15, 23, 42, 0.3); backdrop-filter: blur(4px); transition: opacity 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .sidebar-drawer { transform: translateX(-100%); transition: transform 0.25s cubic-bezier(0.4, 0, 0.2, 1); }
    .sidebar-open .sidebar-drawer { transform: translateX(0); }
    
    .header-icon-btn { display: flex; flex-direction: column; align-items: center; justify-content: center; width: 56px; height: 56px; border-radius: 14px; border: 1px solid #e2e8f0; background: #ffffff; transition: all 0.2s; }
    .dark .header-icon-btn { border-color: #334155; background: #1e293b; }
    .header-icon-btn:hover { background: #f8fafc; border-color: #cbd5e1; }
    .dark .header-icon-btn:hover { background: #334155; border-color: #475569; }
  </style>
</head>
<body class="p-4 md:p-6 bg-[#fcfcfd] text-slate-800 dark:bg-[#0f172a] dark:text-slate-100">

  <div id="sidebar-root" class="fixed inset-0 z-50 pointer-events-none">
    <div id="sidebar-overlay" onclick="closeSidebar()" class="sidebar-overlay absolute inset-0 opacity-0 pointer-events-none"></div>
    <div class="sidebar-drawer absolute left-0 top-0 bottom-0 w-72 bg-white dark:bg-[#1e293b] shadow-2xl border-r border-slate-100 dark:border-slate-800 flex flex-col pointer-events-auto p-5">
      <div class="flex items-center justify-between border-b border-slate-100 dark:border-slate-800 pb-4 mb-4">
        <div>
          <h3 class="text-xs font-extrabold text-slate-400 uppercase tracking-wider">Switch Topic</h3>
          <p id="sidebar-subject-title" class="text-sm font-bold text-slate-700 dark:text-slate-300 truncate max-w-[180px]">...</p>
        </div>
        <button onclick="closeSidebar()" class="w-8 h-8 flex items-center justify-center text-slate-400 hover:text-slate-600 dark:hover:text-slate-200 font-bold text-lg">✕</button>
      </div>
      <div id="sidebar-topic-list" class="flex-1 overflow-y-auto space-y-1.5 pr-1 text-sm">
        <span class="text-xs text-slate-400 italic">No topics active...</span>
      </div>
    </div>
  </div>

  <div id="app" class="max-w-xl mx-auto">
    
    <div class="flex justify-between items-center mb-6 gap-2">
      <div class="min-w-0 flex-1">
        <div id="header-breadcrumbs" class="hidden text-xs text-blue-500 font-bold mb-1 flex items-center gap-1">
          <button id="header-back-indicator-btn" onclick="triggerContextBackRouting()">← Go Back</button>
        </div>
        <h1 id="app-dynamic-main-title" class="text-xl font-extrabold text-slate-800 dark:text-slate-100 truncate">Select Subject</h1>
        <p id="app-dynamic-sub-title" class="text-xs text-slate-400 truncate">Choose a subject worksheet tab to begin</p>
      </div>
      
      <div class="flex items-center gap-1.5 shrink-0">
        <button onclick="toggleAudioMute()" class="header-icon-btn text-slate-600 dark:text-slate-300" title="Toggle Sound">
          <span id="sound-icon-container">
            <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
              <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
            </svg>
          </span>
          <span id="sound-text-label" class="text-[8px] font-extrabold uppercase tracking-wide mt-1 scale-[0.9]">Sound</span>
        </button>

        <button onclick="toggleDarkMode()" class="header-icon-btn text-slate-600 dark:text-slate-300" title="Toggle Theme">
          <span id="theme-icon-container"></span>
          <span id="theme-text-label" class="text-[8px] font-extrabold uppercase tracking-wide mt-1 scale-[0.9]">Dark</span>
        </button>

        <button onclick="showSubjectsScreen()" class="header-icon-btn text-slate-600 dark:text-slate-300" title="Go Home">
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="m2.25 12 8.954-8.955c.44-.439 1.152-.439 1.591 0L21.75 12M4.5 9.75v10.125c0 .621.504 1.125 1.125 1.125H9.75v-4.875c0-.621.504-1.125 1.125-1.125h2.25c.621 0 1.125.504 1.125 1.125V21h4.125c.621 0 1.125-.504 1.125-1.125V9.75M8.25 21h8.25" />
          </svg>
          <span class="text-[8px] font-extrabold uppercase tracking-wide mt-1 scale-[0.9]">Home</span>
        </button>
      </div>
    </div>

    <div id="subject-screen">
      <div id="subject-grid" class="space-y-3 mt-2">
        <div class="space-y-2">
          <div class="shimmer h-16 w-full"></div>
          <div class="shimmer h-16 w-full"></div>
        </div>
      </div>
    </div>

    <div id="chapter-screen" class="hidden">
      <div id="chapter-grid" class="space-y-3"></div>
    </div>

    <div id="quiz-screen" class="hidden">
      
      <div class="flex items-center gap-3 mb-4">
        <button onclick="openSidebar()" class="w-11 h-11 flex flex-col items-center justify-center border border-slate-200 dark:border-slate-700 rounded-xl hover:bg-slate-50 dark:hover:bg-slate-800 transition gap-[4px]">
          <span class="w-4 h-[2px] bg-slate-600 dark:bg-slate-400 rounded-full"></span>
          <span class="w-4 h-[2px] bg-slate-600 dark:bg-slate-400 rounded-full"></span>
          <span class="w-4 h-[2px] bg-slate-600 dark:bg-slate-400 rounded-full"></span>
        </button>
        
        <div class="flex-1 min-w-0">
          <h2 id="header-subject-name" class="text-sm font-extrabold text-slate-500 dark:text-slate-400 truncate uppercase tracking-wider leading-none">Subject Title</h2>
          <p id="header-topic-name" class="text-base font-bold text-slate-800 dark:text-slate-100 truncate">Topic Parameters Sub-Header</p>
        </div>

        <div class="flex items-center shrink-0">
          <button onclick="changeFontSize(-1)" class="w-9 h-11 border border-slate-200 dark:border-slate-700 rounded-l-xl hover:bg-slate-50 dark:hover:bg-slate-800 text-xs font-bold" title="Decrease Font">A⁻</button>
          <button onclick="changeFontSize(1)" class="w-9 h-11 border-y border-r border-slate-200 dark:border-slate-700 rounded-r-xl hover:bg-slate-50 dark:hover:bg-slate-800 text-xs font-bold" title="Increase Font">A⁺</button>
        </div>
      </div>

      <div class="grid grid-cols-3 gap-2.5 mb-3.5">
        <div class="bento-card p-2 text-center border-b-[3px] border-b-green-500">
          <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Correct</p>
          <p id="score-correct" class="text-base font-extrabold text-green-600">0</p>
        </div>
        <div class="bento-card p-2 text-center border-b-[3px] border-b-red-500">
          <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Wrong</p>
          <p id="score-wrong" class="text-base font-extrabold text-red-600">0</p>
        </div>
        <div class="bento-card p-2 text-center border-b-[3px] border-b-blue-500">
          <p class="text-[8px] font-bold text-slate-400 uppercase tracking-wider">Total</p>
          <p id="score-total" class="text-base font-extrabold text-blue-600">...</p>
        </div>
      </div>

      <div class="bento-card p-3 mb-4 bg-slate-50 dark:bg-slate-800/50 relative">
        <div class="flex items-center justify-between gap-2">
          <div id="badge-row-container" class="flex-1 overflow-x-auto no-scrollbar py-1">
            <div id="badge-slider-row" class="flex gap-1.5 items-center">
              <span class="text-xs text-slate-400 italic">Processing layout...</span>
            </div>
          </div>
          <button onclick="toggleGridExpandedView()" class="w-8 h-8 flex items-center justify-center rounded-lg hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-500 dark:text-slate-400 text-lg font-bold transition">⋮</button>
        </div>

        <div id="expanded-matrix-panel" class="hidden mt-3 pt-3 border-t border-slate-200 dark:border-slate-700">
          <p class="text-[9px] font-bold text-slate-400 uppercase tracking-wider mb-2">Expanded Grid Index</p>
          <div id="badge-matrix-grid" class="flex flex-wrap gap-1.5 max-h-[140px] overflow-y-auto pr-1"></div>
        </div>
      </div>

      <div id="quiz-card" class="bento-card p-6 md:p-8 mb-6 swipe-zone">
        <div class="flex justify-between items-start gap-2 mb-1">
          <div id="exam-tag" class="text-[10px] text-blue-500 font-bold italic tracking-wide"></div>
        </div>
        <div id="q-label" class="text-[11px] font-bold text-slate-400 mb-3 tracking-wider"></div>
        <h2 id="q-text" class="font-bold leading-snug mb-8 text-slate-800 dark:text-slate-100 transition-all"></h2>
        <div id="options-grid" class="transition-all"></div>
        <div id="explanation-box" class="hidden mt-6 p-5 bg-blue-50 dark:bg-blue-950/40 rounded-2xl border border-blue-100 dark:border-blue-900/50 text-xs text-slate-600 dark:text-slate-300 leading-relaxed"></div>
      </div>

      <div class="flex justify-between gap-3">
        <button id="prev-btn" onclick="prevQ()" class="nav-btn !bg-slate-100 dark:!bg-slate-800 !text-slate-500 dark:!text-slate-400">← Prev</button>
        <button id="next-btn" onclick="nextQ()" class="nav-btn flex-1">Next →</button>
      </div>
      <button onclick="triggerContextBackRouting()" class="w-full mt-8 py-4 text-slate-400 text-[11px] font-bold uppercase tracking-widest border-t border-dashed border-slate-200 dark:border-slate-800 hover:text-slate-600 dark:hover:text-slate-300">Back to Topics</button>
    </div>
  </div>

  <script>
    // ==========================================
    // CONFIGURATION: Paste your Web App URL here
    // ==========================================
    const API_URL = "https://script.google.com/macros/s/AKfycbyLgrD13CeqmAxz92Xpop90RKBNHQpMjWa-agip16U8EAPBs41opsEuk18b0Y96FfSY/exec"; 

    let selectedSubject = "";
    let selectedChapter = "";
    let qList = []; 
    let fullQuestions = {}; 
    let curIdx = 0;
    let userAnswers = {};

    let touchStartX = 0;
    let touchEndX = 0;
    let isMatrixExpanded = false;
    let fontSizeLevel = parseInt(localStorage.getItem('font_size_lvl')) || 0; 
    let audioMuted = localStorage.getItem('audio_muted') === 'true';

    // Core Audio Context Driver Module Execution Link Setup
    const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    
    // Core Feedback Processing System Engine Configuration (Sound & Mobile Vibration Integration)
    function triggerDeviceFeedback(type) {
      // 1. Physical Device Haptic Pulse Pipeline (Native WebAPI Hardware Mapping Link System)
      if (navigator.vibrate) {
        if (type === 'correct') {
          navigator.vibrate(50); // Clean, tactical confirmation pulse
        } else if (type === 'wrong') {
          navigator.vibrate(200); // Prominent notification warning buzz rumble
        } else if (type === 'tap') {
          navigator.vibrate(15); // Instant low-profile micro mechanical click tick
        }
      }

      // 2. Synthetic Audio Oscillator Waveform Render Layer Pipeline Configuration
      if (audioMuted) return;
      try {
        // Essential Mobile Constraint Bypass Fix: Continuous hardware context baseline wakeup pass execution
        if (audioCtx.state === 'suspended') {
          audioCtx.resume();
        }
        
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.connect(gain);
        gain.connect(audioCtx.destination);
        
        if (type === 'correct') {
          osc.frequency.setValueAtTime(587.33, audioCtx.currentTime); 
          osc.frequency.setValueAtTime(880, audioCtx.currentTime + 0.08); 
          gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
          osc.start(); osc.stop(audioCtx.currentTime + 0.25);
        } else if (type === 'wrong') {
          osc.frequency.setValueAtTime(220, audioCtx.currentTime); 
          osc.type = 'sawtooth';
          gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
          osc.start(); osc.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'tap') {
          osc.frequency.setValueAtTime(440, audioCtx.currentTime); 
          gain.gain.setValueAtTime(0.04, audioCtx.currentTime);
          osc.start(); osc.stop(audioCtx.currentTime + 0.05);
        }
      } catch(e) {
        console.warn("Hardware audio engine context link block intercepted:", e);
      }
    }

    // Historical method map connector definition proxy reference
    function playBeepSound(type) {
      triggerDeviceFeedback(type);
    }

    window.onload = () => {
      if(localStorage.getItem('theme') === 'dark') {
        document.documentElement.classList.add('dark');
      }
      
      updateMuteIconsUI();
      updateThemeLabelsAndIconsUI();
      applyFontSizeStyles();
      setupSwipeGestures();

      const savedSession = sessionStorage.getItem('active_quiz_session');
      if (savedSession) {
        try {
          const sessionData = JSON.parse(savedSession);
          selectedSubject = sessionData.subject;
          selectedChapter = sessionData.chapter;
          qList = sessionData.qList || [];
          fullQuestions = sessionData.fullQuestions || {};
          curIdx = sessionData.curIdx || 0;
          userAnswers = sessionData.userAnswers || {};
          
          window.history.replaceState({ screen: 'quiz' }, '');
          applyNavigationTransitionEffects('quiz');
          
          document.getElementById('header-subject-name').innerText = selectedSubject;
          document.getElementById('header-topic-name').innerText = selectedChapter;
          document.getElementById('score-total').innerText = qList.length;
          
          updateScores();
          loadCurrentQuestion();
          loadSubjectsSilentBackup(); 
          loadChaptersSilentBackup(selectedSubject);
          return;
        } catch(e) {
          clearQuizRuntimeCache();
        }
      }

      clearQuizRuntimeCache();
      loadSubjects();
      window.history.replaceState({ screen: 'subject' }, '');
      evaluateDynamicHeaderTitles('subject');
    };

    window.onpopstate = (event) => {
      if (!event.state) return;
      applyNavigationTransitionEffects(event.state.screen);
    };

    function saveQuizProgressSession() {
      if (qList.length > 0) {
        const payload = {
          subject: selectedSubject,
          chapter: selectedChapter,
          qList: qList,
          fullQuestions: fullQuestions,
          curIdx: curIdx,
          userAnswers: userAnswers
        };
        sessionStorage.setItem('active_quiz_session', JSON.stringify(payload));
      }
    }

    function triggerContextBackRouting() {
      triggerDeviceFeedback('tap');
      window.history.back();
    }

    function applyNavigationTransitionEffects(targetScreen) {
      const sub = document.getElementById('subject-screen');
      const ch = document.getElementById('chapter-screen');
      const qz = document.getElementById('quiz-screen');

      sub.classList.add('hidden');
      ch.classList.add('hidden');
      qz.classList.add('hidden');

      if (targetScreen === 'subject') {
        clearQuizRuntimeCache();
        sub.classList.remove('hidden');
      } else if (targetScreen === 'chapter') {
        sessionStorage.removeItem('active_quiz_session');
        ch.classList.remove('hidden');
      } else if (targetScreen === 'quiz') {
        qz.classList.remove('hidden');
      }
      evaluateDynamicHeaderTitles(targetScreen);
    }

    function evaluateDynamicHeaderTitles(screenKey) {
      const crumbs = document.getElementById('header-breadcrumbs');
      const mainTitle = document.getElementById('app-dynamic-main-title');
      const subTitle = document.getElementById('app-dynamic-sub-title');
      const backIndicator = document.getElementById('header-back-indicator-btn');

      if(screenKey === 'subject') {
        crumbs.classList.add('hidden');
        mainTitle.innerText = "Select Subject";
        subTitle.innerText = "Choose a subject worksheet tab to begin";
      } else if(screenKey === 'chapter') {
        crumbs.classList.remove('hidden');
        backIndicator.innerText = "← Change Subject";
        mainTitle.innerText = selectedSubject || "Topics";
        subTitle.innerText = "Select a specific sub-topic study track blueprint";
      } else if(screenKey === 'quiz') {
        crumbs.classList.remove('hidden');
        backIndicator.innerText = "← Back to Topics";
        mainTitle.innerText = selectedChapter || "Quiz Assessment Mode";
        subTitle.innerText = "Answer questions smoothly. Swipe left/right to move.";
      }
    }

    function toggleDarkMode() {
      triggerDeviceFeedback('tap');
      if (document.documentElement.classList.contains('dark')) {
        document.documentElement.classList.remove('dark');
        localStorage.setItem('theme', 'light');
      } else {
        document.documentElement.classList.add('dark');
        localStorage.setItem('theme', 'dark');
      }
      updateThemeLabelsAndIconsUI();
    }

    function updateThemeLabelsAndIconsUI() {
      const iconContainer = document.getElementById('theme-icon-container');
      const textLabel = document.getElementById('theme-text-label');
      
      if (document.documentElement.classList.contains('dark')) {
        textLabel.innerText = "Light";
        iconContainer.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-amber-400">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 3v2.25m0 13.5V21M5.147 5.147l1.591 1.591M15.662 15.662l1.591 1.591M3 12h2.25m13.5 0H21M5.147 18.853l1.591-1.591M15.662 6.75l1.591-1.591M12 7.5a4.5 4.5 0 1 0 0 9 4.5 4.5 0 0 0 0-9z" />
          </svg>
        `;
      } else {
        textLabel.innerText = "Dark";
        iconContainer.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M21.752 15.002A9.72 9.72 0 0 1 18 15.75c-5.385 0-9.75-4.365-9.75-9.75 0-1.33.266-2.597.748-3.752A9.753 9.753 0 0 0 3 11.25C3 16.635 7.365 21 12.75 21a9.753 9.753 0 0 0 9.002-5.998Z" />
          </svg>
        `;
      }
    }

    function toggleAudioMute() {
      audioMuted = !audioMuted;
      localStorage.setItem('audio_muted', audioMuted);
      updateMuteIconsUI();
      triggerDeviceFeedback('tap');
    }

    function updateMuteIconsUI() {
      const iconContainer = document.getElementById('sound-icon-container');
      const textLabel = document.getElementById('sound-text-label');
      
      if(audioMuted) {
        textLabel.innerText = "Mute";
        iconContainer.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5 text-red-500">
            <path stroke-linecap="round" stroke-linejoin="round" d="M17.25 9.75 19.5 12m0 0 2.25 2.25M19.5 12l2.25-2.25M19.5 12l-2.25 2.25m-10.5-6 4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.01 9.01 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
          </svg>
        `;
      } else {
        textLabel.innerText = "Sound";
        iconContainer.innerHTML = `
          <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2.5" stroke="currentColor" class="w-5 h-5">
            <path stroke-linecap="round" stroke-linejoin="round" d="M19.114 5.636a9 9 0 0 1 0 12.728M16.463 8.288a5.25 5.25 0 0 1 0 7.424M6.75 8.25l4.72-4.72a.75.75 0 0 1 1.28.53v15.88a.75.75 0 0 1-1.28.53l-4.72-4.72H4.51c-.88 0-1.704-.507-1.938-1.354A9.009 9.009 0 0 1 2.25 12c0-.83.112-1.633.322-2.396C2.806 8.756 3.63 8.25 4.51 8.25H6.75Z" />
          </svg>
        `;
      }
    }

    function changeFontSize(direction) {
      triggerDeviceFeedback('tap');
      fontSizeLevel = Math.max(-1, Math.min(2, fontSizeLevel + direction));
      localStorage.setItem('font_size_lvl', fontSizeLevel);
      applyFontSizeStyles();
    }

    function applyFontSizeStyles() {
      const qText = document.getElementById('q-text');
      const optGrid = document.getElementById('options-grid');
      if(!qText || !optGrid) return;
      
      qText.classList.remove('text-sm', 'text-base', 'text-lg', 'text-xl', 'text-2xl');
      optGrid.classList.remove('text-xs', 'text-sm', 'text-base', 'text-lg');

      if (fontSizeLevel === -1) {
        qText.classList.add('text-base');
        optGrid.classList.add('text-xs');
      } else if (fontSizeLevel === 1) {
        qText.classList.add('text-xl');
        optGrid.classList.add('text-base');
      } else if (fontSizeLevel === 2) {
        qText.classList.add('text-2xl');
        optGrid.classList.add('text-lg');
      } else {
        qText.classList.add('text-lg'); 
        optGrid.classList.add('text-sm');
      }
    }

    function openSidebar() {
      triggerDeviceFeedback('tap');
      const root = document.getElementById('sidebar-root');
      const overlay = document.getElementById('sidebar-overlay');
      root.classList.add('sidebar-open');
      overlay.classList.remove('pointer-events-none', 'opacity-0');
      overlay.classList.add('pointer-events-auto', 'opacity-100');
      document.getElementById('sidebar-subject-title').innerText = selectedSubject || "Active Subject";
      
      const listContainer = document.getElementById('sidebar-topic-list');
      const chapters = window.cachedChapters || [];
      if(chapters.length === 0) {
        listContainer.innerHTML = `<span class="text-xs text-slate-400 italic">No topics active...</span>`;
        return;
      }
      listContainer.innerHTML = chapters.map(name => {
        const isCurrent = (name === selectedChapter);
        return `
          <div onclick="closeSidebar(); startQuiz('${name.replace(/'/g, "\\'")}')" class="p-3 rounded-xl border cursor-pointer transition-all ${isCurrent ? 'bg-slate-900 border-slate-900 dark:bg-slate-100 dark:border-slate-100 dark:text-[#0f172a] text-white font-bold' : 'bg-slate-50 dark:bg-slate-800 border-slate-100 dark:border-slate-700 text-slate-600 dark:text-slate-300 hover:bg-slate-100 dark:hover:bg-slate-700'}">
            ${name}
          </div>`;
      }).join('');
    }

    function closeSidebar() {
      const root = document.getElementById('sidebar-root');
      const overlay = document.getElementById('sidebar-overlay');
      root.classList.remove('sidebar-open');
      overlay.classList.remove('pointer-events-auto', 'opacity-100');
      overlay.classList.add('pointer-events-none', 'opacity-0');
    }

    function clearQuizRuntimeCache() {
      userAnswers = {};
      fullQuestions = {};
      qList = [];
      curIdx = 0;
      sessionStorage.removeItem('active_quiz_session');
    }

    function loadSubjects() {
      fetch(`${API_URL}?action=getSubjects`)
        .then(response => response.json())
        .then(subjects => {
          if(subjects.error) {
            showGlobalError(subjects.message || subjects.error);
            return;
          }
          renderSubjectsUI(subjects);
        })
        .catch(err => showGlobalError("Deployment Configuration Failure. Check file system parameters."));
    }

    function loadSubjectsSilentBackup() {
      fetch(`${API_URL}?action=getSubjects`)
        .then(response => response.json())
        .then(subjects => { if(!subjects.error) renderSubjectsUI(subjects); })
        .catch(e => {});
    }

    function renderSubjectsUI(subjects) {
      document.getElementById('subject-grid').innerHTML = subjects.map(name => `
        <div onclick="clearQuizRuntimeCache(); selectSubject('${name.replace(/'/g, "\\'")}')" class="bento-card p-5 flex justify-between items-center cursor-pointer hover:border-blue-400 bg-white dark:bg-slate-800 group transition-all">
          <span class="font-bold text-sm text-slate-700 dark:text-slate-200 group-hover:text-blue-600 dark:group-hover:text-blue-400">${name}</span>
          <span class="text-slate-400 group-hover:text-blue-600 transition-transform group-hover:translate-x-1">→</span>
        </div>
      `).join('');
    }

    function showSubjectsScreen() {
      triggerDeviceFeedback('tap');
      clearQuizRuntimeCache();
      loadSubjects(); 
      window.history.pushState({ screen: 'subject' }, '');
      applyNavigationTransitionEffects('subject');
    }

    function selectSubject(subjectName) {
      triggerDeviceFeedback('tap');
      selectedSubject = subjectName;
      window.history.pushState({ screen: 'chapter' }, '');
      applyNavigationTransitionEffects('chapter');

      document.getElementById('chapter-grid').innerHTML = '<div class="space-y-2"><div class="shimmer h-14 w-full"></div><div class="shimmer h-14 w-full"></div></div>';
      fetch(`${API_URL}?action=getChapters&sheetName=${encodeURIComponent(subjectName)}`)
        .then(response => response.json())
        .then(chapters => {
          if(chapters.error) {
             document.getElementById('chapter-grid').innerHTML = `<div class="p-5 text-red-500 text-xs">${chapters.message}</div>`;
             return;
          }
          window.cachedChapters = chapters;
          renderChaptersUIFromCache();
        })
        .catch(err => console.error("Error retrieving JSON keys configuration structure details:", err));
    }

    function loadChaptersSilentBackup(subjectName) {
      fetch(`${API_URL}?action=getChapters&sheetName=${encodeURIComponent(subjectName)}`)
        .then(response => response.json())
        .then(chapters => {
          if(!chapters.error) {
            window.cachedChapters = chapters;
            renderChaptersUIFromCache();
          }
        })
        .catch(e => {});
    }

    function renderChaptersUIFromCache() {
      const chapters = window.cachedChapters || [];
      if (chapters.length === 0) {
        document.getElementById('chapter-grid').innerHTML = '<div class="p-5 text-center text-slate-400 text-xs">No active study paths parsed within this file configuration.</div>';
        return;
      }
      document.getElementById('chapter-grid').innerHTML = chapters.map(name => `
        <div onclick="startQuiz('${name.replace(/'/g, "\\'")}')" class="bento-card p-5 flex justify-between items-center cursor-pointer hover:border-blue-400 bg-white dark:bg-slate-800 group transition-all">
          <span class="font-bold text-sm text-slate-700 dark:text-slate-200 group-hover:text-blue-600 dark:group-hover:text-blue-400">${name}</span>
          <span class="text-slate-400 group-hover:text-blue-600 transition-transform group-hover:translate-x-1">→</span>
        </div>
      `).join('');
    }

    function showGlobalError(msg) {
      document.getElementById('subject-grid').innerHTML = `
        <div class="p-5 bg-red-50 text-red-600 dark:bg-red-950/20 dark:text-red-400 rounded-2xl border border-red-200 dark:border-red-900/50 text-xs text-left">
          <p class="font-bold mb-1 text-sm">Deployment Server Fault Instance</p>
          <p class="font-mono bg-white dark:bg-slate-900 p-3 rounded-xl border border-red-100 dark:border-red-950 my-2 overflow-x-auto">${msg}</p>
        </div>`;
    }

    function startQuiz(chapterName) {
      triggerDeviceFeedback('tap');
      selectedChapter = chapterName;
      qList = []; fullQuestions = {}; userAnswers = {}; curIdx = 0; isMatrixExpanded = false;
      document.getElementById('expanded-matrix-panel').classList.add('hidden');
      
      window.history.pushState({ screen: 'quiz' }, '');
      applyNavigationTransitionEffects('quiz');
      
      document.getElementById('header-subject-name').innerText = selectedSubject;
      document.getElementById('header-topic-name').innerText = selectedChapter;

      document.getElementById('q-text').innerText = "Parsing target JSON stream contents...";
      document.getElementById('options-grid').innerHTML = '<div class="shimmer h-12 mb-2 w-full"></div><div class="shimmer h-12 w-full"></div>';
      document.getElementById('score-correct').innerText = 0;
      document.getElementById('score-wrong').innerText = 0;
      document.getElementById('score-total').innerText = '...';
      document.getElementById('badge-slider-row').innerHTML = `<span class="text-xs text-slate-400 italic">Assembling workspace matrix layout...</span>`;

      // Single Unified optimized Fetch payload operation sequence parsing optimization
      fetch(`${API_URL}?action=getFullChapterData&sheetName=${encodeURIComponent(selectedSubject)}&chapterName=${encodeURIComponent(chapterName)}`)
        .then(response => response.json())
        .then(allData => {
          if(allData.error) {
             document.getElementById('q-text').innerText = "Data parsing exception structural failure.";
             document.getElementById('options-grid').innerHTML = `<span class="text-xs text-red-500">${allData.message}</span>`;
             return;
          }
          
          qList = allData;
          allData.forEach((item, index) => { fullQuestions[index] = item; });
          
          document.getElementById('score-total').innerText = qList.length;
          
          loadCurrentQuestion();
          renderUnifiedQuestionNavigationControls();
          saveQuizProgressSession();
        })
        .catch(err => console.error("Critical execution pipeline breakdown fault:", err));
    }

    function loadCurrentQuestion() {
      if (qList.length === 0) return;
      
      document.getElementById('q-label').innerText = `Question ${curIdx + 1} of ${qList.length}`;
      document.getElementById('explanation-box').classList.add('hidden');
      document.getElementById('prev-btn').disabled = (curIdx === 0);
      document.getElementById('next-btn').disabled = (curIdx === qList.length - 1);
      
      const questionOutline = qList[curIdx];
      document.getElementById('q-text').innerText = questionOutline.Question || "Corrupted internal object profile configuration properties detected.";
      document.getElementById('exam-tag').innerText = questionOutline.Exam || "";

      if (fullQuestions[curIdx]) {
        renderOptions(fullQuestions[curIdx]);
      } else {
        document.getElementById('options-grid').innerHTML = '<div class="shimmer h-12 mb-2 w-full"></div><div class="shimmer h-12 w-full"></div>';
      }

      renderUnifiedQuestionNavigationControls();
    }

    function renderOptions(data) {
      const grid = document.getElementById('options-grid');
      grid.innerHTML = '';
      applyFontSizeStyles();

      ['OptionA', 'OptionB', 'OptionC', 'OptionD', 'OptionE'].forEach((key, i) => {
        const val = data[key];
        if (val !== undefined && val !== null && val.toString().trim() !== "") {
          const letter = String.fromCharCode(65 + i);
          const div = document.createElement('div');
          div.className = 'option-row';
          div.innerHTML = `<span class="font-semibold text-slate-700 dark:text-slate-200">${val}</span>`;
          
          if (userAnswers[curIdx]) {
            if (letter === data.Answer) div.classList.add('selected-correct');
            else if (letter === userAnswers[curIdx]) div.classList.add('selected-wrong');
            showExplanationPanel(data.Explanation);
          } else {
            div.onclick = () => { 
              userAnswers[curIdx] = letter; 
              if (letter === data.Answer) {
                triggerDeviceFeedback('correct'); 
              } else {
                triggerDeviceFeedback('wrong');
              }
              updateScores(); 
              loadCurrentQuestion();
              saveQuizProgressSession();
            };
          }
          grid.appendChild(div);
        }
      });
    }

    function showExplanationPanel(text) {
      const box = document.getElementById('explanation-box');
      box.innerText = text || "No explicit explanation telemetry metrics documented for this item context.";
      box.classList.remove('hidden');
    }

    function updateScores() {
      let correctCount = 0, wrongCount = 0;
      Object.keys(userAnswers).forEach(idx => {
        if (fullQuestions[idx]) {
          if (userAnswers[idx] === fullQuestions[idx].Answer) correctCount++; else wrongCount++;
        }
      });
      document.getElementById('score-correct').innerText = correctCount;
      document.getElementById('score-wrong').innerText = wrongCount;
    }

    function renderUnifiedQuestionNavigationControls() {
      if(qList.length === 0) return;
      
      const generateMatrixLayoutString = () => qList.map((_, idx) => {
        let statusClass = "";
        if (userAnswers[idx]) {
          const isCorrect = (userAnswers[idx] === fullQuestions[idx].Answer);
          statusClass = isCorrect ? "q-circle-correct" : "q-circle-wrong";
        }
        if (idx === curIdx) statusClass += " q-circle-active";
        return `<div class="q-circle ${statusClass}" id="slider-circle-${idx}" onclick="jumpToQuestion(${idx})">${idx + 1}</div>`;
      }).join('');

      document.getElementById('badge-slider-row').innerHTML = generateMatrixLayoutString();
      if (isMatrixExpanded) {
        document.getElementById('badge-matrix-grid').innerHTML = generateMatrixLayoutString();
      }

      setTimeout(() => {
        const targetElement = document.getElementById(`slider-circle-${curIdx}`);
        if(targetElement) targetElement.scrollIntoView({ behavior: 'smooth', block: 'nearest', inline: 'center' });
      }, 30);
    }

    function jumpToQuestion(idx) { 
      triggerDeviceFeedback('tap'); 
      curIdx = idx; 
      loadCurrentQuestion(); 
    }
    
    function nextQ() { 
      if (curIdx < qList.length - 1) { 
        triggerDeviceFeedback('tap'); 
        curIdx++; 
        loadCurrentQuestion(); 
        saveQuizProgressSession();
      } 
    }
    
    function prevQ() { 
      if (curIdx > 0) { 
        triggerDeviceFeedback('tap'); 
        curIdx--; 
        loadCurrentQuestion(); 
        saveQuizProgressSession();
      } 
    }
    
    function toggleGridExpandedView() {
      triggerDeviceFeedback('tap');
      isMatrixExpanded = !isMatrixExpanded;
      document.getElementById('expanded-matrix-panel').classList.toggle('hidden', !isMatrixExpanded);
      renderUnifiedQuestionNavigationControls();
    }

    // High fidelity responsive touch screen swipe interpretation layout matrix configuration
    function setupSwipeGestures() {
      const card = document.getElementById('quiz-card');
      card.addEventListener('touchstart', e => { touchStartX = e.changedTouches[0].screenX; }, { passive: true });
      card.addEventListener('touchend', e => { 
        touchEndX = e.changedTouches[0].screenX; 
        const delta = touchStartX - touchEndX; 
        if (Math.abs(delta) > 65) { 
          if (delta > 0) nextQ(); else prevQ(); 
        } 
      }, { passive: true });
    }
  </script>
</body>
</html>
